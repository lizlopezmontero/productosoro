<div class="contenido">
    <div class="contenedor grid">
        <mat-card class="example-card col-6 md:col-4 lg:col-3 xl:col-2 mb-3 ml-2" *ngFor="let tile of tiles" [routerLink]="tile.link">
            <mat-card-header>
              <mat-card-title>
                <div class="text-center">
                  {{tile.text}}
                </div>
              </mat-card-title>
            </mat-card-header>
            <img mat-card-image [src]="tile.img" alt="img" width="100px">
            <mat-card-content >
              <p class="font-bold">
                {{tile.description}}
              </p>
            </mat-card-content>
          </mat-card>
    </div>
</div>
