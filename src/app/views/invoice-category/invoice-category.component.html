<p-toast key="ts"></p-toast>
<p-confirmDialog ></p-confirmDialog>
<mat-card class="main-card">
    <mat-card-header>
        <div class="header-format">
          <span >Categorías para facturación</span>
          <div>
            <button mat-mini-fab color="accent" class="mr-2" (click)="nuevo()">
                <mat-icon>add_circle</mat-icon>
            </button>
            <button mat-icon-button [routerLink]="['/app/inicio']">
                <mat-icon>arrow_back</mat-icon>
            </button>
          </div>
        </div>
        
    </mat-card-header>
    <mat-card-content>
        <p-table #dtl styleClass="p-datatable-sm p-datatable-striped p-datatable-gridlines" responsiveLayout="stack" [breakpoint]="'799px'"
        [paginator]="true" [rows]="10" [showCurrentPageReport]="true"  [value]="categoriasFactura"
        selectionMode="single" dataKey="id"
        currentPageReportTemplate="Mostrando registros del {first} al {last} de {totalRecords}" [rowsPerPageOptions]="[10, 25, 50]"
        [loading]="loading" [globalFilterFields]="['id', 'nombre']">
        <ng-template pTemplate="caption">
            <div class="flex">
                <span class="p-input-icon-left ml-auto" [style]="{width: '100%'}">
                    <i class="pi pi-search"></i>
                    <input pInputText  type="text" (input)="dtl.filterGlobal($event.target.value, 'contains')" placeholder="Buscar elemento" />
                </span>
            </div>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="descripcion">Descripción <p-sortIcon field="descripcion"></p-sortIcon></th>
                <th pSortableColumn="categoria">Categoría <p-sortIcon field="categoria"></p-sortIcon></th>
                <th style="min-width:110px">Acciones</th>
            </tr>
            <tr>
                <th>
                    <p-columnFilter type="text" field="descripcion"></p-columnFilter>
                </th>
                <th>
                    <p-columnFilter type="text" field="categoria"></p-columnFilter>
                </th>
                <th></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-place>
            <tr>
                <td style="justify-content: start;"><span class="p-column-title font-bold w-50">Producto:</span> {{place.descripcion}}</td>
                <td style="justify-content: start;"><span class="p-column-title font-bold w-50">Categoría:</span>  {{place.categoria}}</td>
                <td style="justify-content: start;">
                    <button mat-mini-fab color="primary" aria-label="edit" class="mr-2" (click)="editar(place)">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-mini-fab color="warn" aria-label="delete" (click)="confirm(place)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="2">No hay registros</td>
            </tr>
        </ng-template>
        </p-table>
    </mat-card-content>
    <mat-card-footer>
        <a mat-button class="m-2" [routerLink]="['/app/inicio']">Volver al inicio</a>
    </mat-card-footer>
</mat-card>

<p-dialog [header]="editando? 'Editar elemento': 'Agregar elemento'" [(visible)]="visible" [modal]="true" [style]="{ 'min-width': '300px', width: '350px' }"
 [draggable]="true" [resizable]="true" [closable]="true" position="top">
    <mat-card class="u-mt-3 p-3" [ngClass]="{ 'u-h-center u-mw-500': !isMobile }">
        <mat-card-content>
            <form  (submit)="guardar()">

                <div>
                    <mat-label>Producto</mat-label>
                    <p-dropdown name="id" [options]="productos" optionLabel="descripcion" optionValue="id" [style]="{width: '100%'}"
                     [readonly]="editando" (onChange)="seleccionarProducto($event.value)" [filter]="true" filterBy="descripcion" appendTo="body"
                     [(ngModel)]="catFacturacion.id" [ngModelOptions]="{standalone: true}" placeholder="Seleccione..."></p-dropdown>
                     <small class="text-danger" *ngIf="send && !catFacturacion.id">Este campo es requerido</small>
                </div>
                <div>
                    <mat-label>Categoría</mat-label>
                    <p-dropdown name="cat" [options]="listas" [style]="{width: '100%'}" appendTo="body" [(ngModel)]="catFacturacion.categoria"
                     [ngModelOptions]="{standalone: true}" [editable]="true" placeholder="Dig. o Selecc."></p-dropdown>
                     <small class="text-danger" *ngIf="send && !catFacturacion.categoria">Este campo es requerido</small>
                </div>
                <div>
                    <mat-label>Orden</mat-label>
                    <p-inputNumber name="orden" [(ngModel)]="catFacturacion.orden" [ngModelOptions]="{standalone: true}"></p-inputNumber>
                    <small class="text-danger" *ngIf="send && !catFacturacion.orden">Este campo es requerido</small>
                </div>
            </form>
        </mat-card-content>
        <mat-card-actions>
            <button mat-raised-button color="primary" (click)="guardar()" class="mr-3">Guardar</button>
            <button mat-raised-button (click)="visible = false">Cerrar</button>
        </mat-card-actions>
    </mat-card>
</p-dialog>
